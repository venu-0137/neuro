<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuroTalk AI | Deep Emotional Insights</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-glow"></div>
    
    <main class="container">
        <header>
            <div class="logo">
                <div class="pulse"></div>
                <h1>NeuroTalk AI</h1>
            </div>
            <p>Unlocking the layers of human emotion through advanced transformers.</p>
        </header>

        <section class="analysis-section">
            <div class="glass-card">
                <textarea id="text-input" placeholder="How are you feeling right now?..."></textarea>
                <div class="controls">
                    <span id="char-count">0 / 500</span>
                    <button id="analyze-btn">Analyze Mindset</button>
                </div>
            </div>
        </section>

        <section id="results-section" class="hidden">
            <div class="results-header">
                <h2>Emotional Signature</h2>
                <div class="divider"></div>
            </div>
            <div class="emotion-display">
                <div id="primary-emotion-card" class="result-card main">
                    <span class="label">Primary State</span>
                    <h3 id="predicted-emotion">Neutral</h3>
                    <div class="visualization">
                        <div class="wave"></div>
                    </div>
                </div>
            </div>
            <button id="reset-btn">New Analysis</button>
        </section>

        <footer class="footer-minimal">
            Powered by DistilBERT transformer & FastAPI
        </footer>
    </main>

    <script src="script.js"></script>
</body>
</html>
